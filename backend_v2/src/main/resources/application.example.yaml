spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: jchatmind
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/your_database}
    username: ${DB_USERNAME:your_db_username}
    password: ${DB_PASSWORD:your_db_password}
    driver-class-name: org.postgresql.Driver
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your_mail_username}
    password: ${MAIL_PASSWORD:your_mail_app_password}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:your_deepseek_api_key}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-chat}
    zhipuai:
      api-key: ${ZHIPUAI_API_KEY:your_zhipuai_api_key}
      base-url: ${ZHIPUAI_BASE_URL:https://open.bigmodel.cn/api/paas}
      chat:
        options:
          model: ${ZHIPUAI_MODEL:glm-4.6}
mybatis:
  type-aliases-package: com.kama.jchatmind.model.entity
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.kama.jchatmind.typehandler

document:
  storage:
    base-path: ${DOCUMENT_STORAGE_BASE_PATH:./data/documents}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  embedding-model: ${OLLAMA_EMBEDDING_MODEL:bge-m3}
