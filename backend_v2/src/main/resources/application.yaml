spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: jchatmind
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jchatmind}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-chat}
    zhipuai:
      api-key: ${ZHIPUAI_API_KEY}
      base-url: ${ZHIPUAI_BASE_URL:https://open.bigmodel.cn/api/paas}
      chat:
        options:
          model: ${ZHIPUAI_MODEL:glm-4.6}
    mcp:
      server:
        name: JchatMind MCP Server
        version: 1.0.0
        type: SYNC
      client:
        initialized: false
        stdio:
          connections:
            notion:
              command: npx.cmd
              args:
                - "-y"
                - "@notionhq/notion-mcp-server"
              env:
                NOTION_TOKEN: ${NOTION_API_KEY:}
mybatis:
  type-aliases-package: com.kama.jchatmind.model.entity
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.kama.jchatmind.typehandler

document:
  storage:
    base-path: ${DOCUMENT_STORAGE_BASE_PATH:./data/documents}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  embedding-model: ${OLLAMA_EMBEDDING_MODEL:bge-m3}

mcp:
  api-key: ${MCP_API_KEY:}

jchatmind:
  harness:
    human-approval:
      enabled: true
      tools:
        - sendEmail
        - databaseQuery
      timeout-seconds: 300
    circuit-breaker:
      enabled: true
      tools:
        - sendEmail
        - databaseQuery
      failure-threshold: 3
      recovery-timeout-seconds: 60
    audit:
      enabled: true
      max-records-per-session: 1000
